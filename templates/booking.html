{% extends "layout.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>จองห้อง {{ room }}</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

ชื่อผู้จอง

</label>

<input
type="text"
name="name"
class="form-control"
placeholder="กรอกชื่อ"
required>

</div>

<div class="alert alert-info">

<b>การจองของวันที่</b>

{{ today }}

</div>

<div class="mb-3">

<label class="form-label">

เวลาเริ่ม

</label>

<input
type="time"
name="start"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

เวลาสิ้นสุด

</label>

<input
type="time"
name="end"
class="form-control"
required>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-success">

ยืนยันการจอง

</button>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
